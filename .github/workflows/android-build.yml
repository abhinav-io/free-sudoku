name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4.2.2

    - name: Set up Node.js Environment
      uses: actions/setup-node@v4.2.0
      with:
        node-version: 22

    - name: Set up Java Development Kit (JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Initialize and Install Capacitor
      run: |
        if [ ! -f package.json ]; then npm init -y; fi
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Prepare Web Assets Folder
      run: |
        # Create a dedicated directory for the build assets to prevent root looping
        mkdir -p dist
        cp index.html style.css script.js dist/
        # Update capacitor config to point directly to this folder
        sed -i 's/"webDir": ""/"webDir": "dist"/' capacitor.config.json

    - name: Add Android Platform Wrapper
      run: npx cap add android

    - name: Sync Web Files to Android Assets
      run: npx cap sync android

    - name: Compile Native Android APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: free-sudoku-master-android-app
        path: android/app/build/outputs/apk/debug/free-sudoku-master-debug.apk
