name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Set up Java Development Kit (JDK)
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Initialize and Install Capacitor
      run: |
        # Create a clean package manifest if it doesn't exist
        if [ ! -f package.json ]; then npm init -y; fi
        # Install explicit packages 
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Add Android Platform Wrapper
      run: npx cap add android

    - name: Sync Web Files to Android Assets
      run: npx cap sync android

    - name: Compile Native Android APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: free-sudoku-master-android-app
        path: android/app/build/outputs/apk/debug/free-sudoku-master-debug.apk
