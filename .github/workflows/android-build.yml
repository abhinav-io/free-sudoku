name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4.2.2

    - name: Set up Node.js Environment
      uses: actions/setup-node@v4.2.0
      with:
        node-version: 22

    - name: Set up Java Development Kit (JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Initialize and Install Capacitor
      run: |
        if [ ! -f package.json ]; then npm init -y; fi
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Prepare Web Assets Folder
      run: |
        mkdir -p dist
        cp index.html style.css script.js dist/
        
        node -e "
          const fs = require('fs');
          let config = {};
          if (fs.existsSync('capacitor.config.json')) {
            config = JSON.parse(fs.readFileSync('capacitor.config.json', 'utf8'));
          }
          config.appId = config.appId || 'io.abhinav.freesudoku';
          config.appName = config.appName || 'Sudoku Master';
          config.webDir = 'dist';
          fs.writeFileSync('capacitor.config.json', JSON.stringify(config, null, 2));
        "

    - name: Add Android Platform Wrapper
      run: npx cap add android

    - name: Sync Web Files to Android Assets
      run: npx cap sync android

    - name: Inject Custom Gradle Output Filename
      run: |
        # Use Node to cleanly append the custom naming rule to the generated build.gradle file
        node -e "
          const fs = require('fs');
          const file = 'android/app/build.gradle';
          if (fs.existsSync(file)) {
            let content = fs.readFileSync(file, 'utf8');
            const customNamingRule = \`
    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            outputFileName = 'free-sudoku-master-' + variant.buildType.name + '.apk'
        }
    }
\`;
            // Inject our rule right before the closing brace of the android block
            content = content.replace(/}\s*$/s, customNamingRule + '\n}');
            fs.writeFileSync(file, content);
            console.log('Successfully injected custom naming rule into build.gradle');
          } else {
            console.error('Target build.gradle file not found!');
            process.exit(1);
          }
        "

    - name: Compile Native Android APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sudoku-android-app
        path: android/app/build/outputs/apk/debug/free-sudoku-master-debug.apk
