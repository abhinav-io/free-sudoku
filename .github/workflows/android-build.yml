name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4.2.2

    - name: Set up Node.js Environment
      uses: actions/setup-node@v4.2.0
      with:
        node-version: 22

    - name: Set up Java Development Kit (JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Initialize and Install Capacitor
      run: |
        if [ ! -f package.json ]; then npm init -y; fi
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Prepare Web Assets Folder
      run: |
        mkdir -p dist
        cp index.html style.css script.js dist/
        
        node -e "
          const fs = require('fs');
          let config = {};
          if (fs.existsSync('capacitor.config.json')) {
            config = JSON.parse(fs.readFileSync('capacitor.config.json', 'utf8'));
          }
          config.appId = config.appId || 'com.abhinavandroidapps.freesudokumaster';
          config.appName = config.appName || 'Free Sudoku Master';
          config.webDir = 'dist';
          fs.writeFileSync('capacitor.config.json', JSON.stringify(config, null, 2));
        "

    - name: Add Android Platform Wrapper
      run: npx cap add android

    - name: Sync Web Files to Android Assets
      run: npx cap sync android

    - name: Inject Custom Gradle Output Filename
      run: |
        node -e "
          const fs = require('fs');
          const file = 'android/app/build.gradle';
          if (fs.existsSync(file)) {
            let content = fs.readFileSync(file, 'utf8');
            
            // Define the custom naming logic block
            const customNamingRule = '\n    applicationVariants.all { variant ->\n' +
                                     '        variant.outputs.all { output ->\n' +
                                     '            outputFileName = \"free-sudoku-master-\" + variant.buildType.name + \".apk\"\n' +
                                     '        }\n' +
                                     '    }\n';
            
            // Target the closing brace of 'buildTypes { ... }' which is guaranteed to be inside the android block
            if (content.includes('buildTypes {')) {
              content = content.replace(/buildTypes\s*\{[\s\S]*?\}/, (match) => match + '\n' + customNamingRule);
              fs.writeFileSync(file, content);
              console.log('Successfully injected custom naming rule inside the android block');
            } else {
              console.error('Could not find buildTypes block to anchor injection!');
              process.exit(1);
            }
          } else {
            console.error('Target build.gradle file not found!');
            process.exit(1);
          }
        "

    - name: Compile Native Android APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sudoku-android-app
        path: android/app/build/outputs/apk/debug/free-sudoku-master-debug.apk
